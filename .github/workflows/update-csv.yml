name: Update Incidents CSV from Google Sheets

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest Enforcement Incidents CSV
        run: curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vRl0u5cD7Pqam-o_qXLfxDqxWfQH-icDDA6btfFcvh6dz19HGS5CJHwihBlA00asJTuLTabyhLLI2Aa/pub?gid=1130252425&single=true&output=csv" -o data.csv
      
      - name: Debug CSV content
        run: | 
          echo "First 5 lines of CSV:"
          head -n 5 data.csv
      
      - name: Check for differences
        run: git status
      
      - name: Commit updated CSV
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.csv
          git diff --quiet && echo "No changes" || git commit -m "Update CSV from Google Sheets" || exit 0
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main

