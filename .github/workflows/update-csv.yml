name: Update Incidents CSV from Google Sheets

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: update-csv
  cancel-in-progress: true

permissions:
  contents: write
  
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest Enforcement Incidents CSV
        run: curl -L "https://docs.google.com/spreadsheets/d/e/2PACX-1vRl0u5cD7Pqam-o_qXLfxDqxWfQH-icDDA6btfFcvh6dz19HGS5CJHwihBlA00asJTuLTabyhLLI2Aa/pub?gid=1130252425&single=true&output=csv" -o data.csv
      
      - name: Copy CSV for GitHub Pages
        run: cp data.csv data_latest.csv
      
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add data.csv data_latest.csv

          git diff --cached --quiet || git commit -m "Update English CSV"

          # Pull latest changes and rebase
          git pull --rebase origin main

          git push origin main
